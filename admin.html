async function loadData() {

async function loadParticipants() {
  document.getElementById("participants-body").innerHTML = '<div class="loading">載入中…</div>';
  const snap = await db.collection("participants").get();
  allParticipants = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  const total  = allParticipants.length;
  const full   = allParticipants.filter(p => (p.stamps||[]).length >= 6).length;
  const survey = allParticipants.filter(p => p.surveyDone).length;
  const gift   = allParticipants.filter(p => p.giftCode).length;

  document.getElementById("stat-total").textContent  = total;
  document.getElementById("stat-full").textContent   = full;
  document.getElementById("stat-survey").textContent = survey;
  document.getElementById("stat-gift").textContent   = gift;

  const spotNames = {
    spot_01: "福仔在哪裡？", spot_02: "閩南式傳統四合院", spot_03: "傳統閩南式紅磚木造商家",
    spot_04: "80年代火車頭？", spot_05: "找找綠地公園？", spot_06: "綠地公園與四合院"
  };
  const allSpots = ["spot_01","spot_02","spot_03","spot_04","spot_05","spot_06"];

  let html = `<table>
    <thead><tr>
      <th>姓名</th><th>Email</th><th>集章狀況</th><th>問卷</th><th>抽獎獎項</th><th>序號</th><th>兌換狀態</th><th>登記時間</th>
    </tr></thead><tbody>`;

  allParticipants.sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

  allParticipants.forEach(p => {
    const stamps = p.stamps || [];
    const count = stamps.length;
    const dots = allSpots.map(s =>
      `<div class="dot ${stamps.includes(s) ? 'dot-filled' : 'dot-empty'}" title="${spotNames[s]}"></div>`
    ).join('');
    const stampBadge = count >= 6
      ? `<span class="badge badge-full">${count}/6 完成</span>`
      : `<span class="badge badge-partial">${count}/6</span>`;
    const surveyBadge = p.surveyDone
      ? `<span class="badge badge-done">已完成</span>`
      : `<span class="badge badge-pending">未完成</span>`;
    const giftCode = p.giftCode || '—';
    const date = p.createdAt ? new Date(p.createdAt.seconds * 1000).toLocaleDateString("zh-TW") : '—';

    const prizeName = p.prizeName || '—';
    const redeemBadge = p.redeemed
      ? `<span class="badge badge-done">已兌換</span>`
      : (p.prizeName ? `<span class="badge badge-pending">待兌換</span>` : '—');
    html += `<tr>
      <td style="font-weight:500;">${p.displayName || '—'}</td>
      <td style="color:#666;">${p.email || '—'}</td>
      <td>${stampBadge}<div class="stamp-dots" style="margin-top:4px;">${dots}</div></td>
      <td>${surveyBadge}</td>
      <td style="color:var(--brick);font-weight:600;">${prizeName}</td>
      <td style="font-family:monospace; color:var(--brick); font-weight:700;">${giftCode}</td>
      <td>${redeemBadge}</td>
      <td style="color:#888;">${date}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById("participants-body").innerHTML = html;
}

async function loadSurveys() {
  document.getElementById("survey-body").innerHTML = '<div class="loading">載入中…</div>';
  const snap = await db.collection("survey_responses").get();
  allSurveys = snap.docs.map(d => ({ id: d.id, ...d.data() }));

  if (allSurveys.length === 0) {
    document.getElementById("survey-body").innerHTML = '<div class="loading">尚無問卷回饋</div>';
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>姓名</th><th>Email</th><th>滿意度</th><th>最喜歡的據點</th><th>意見回饋</th><th>序號</th><th>填寫時間</th>
    </tr></thead><tbody>`;

  const satisfactionMap = { "5": "非常滿意", "4": "滿意", "3": "普通", "2": "不滿意" };

  allSurveys.sort((a,b) => (b.submittedAt?.seconds||0) - (a.submittedAt?.seconds||0));

  allSurveys.forEach(s => {
    const date = s.submittedAt ? new Date(s.submittedAt.seconds * 1000).toLocaleDateString("zh-TW") : '—';
    html += `<tr>
      <td style="font-weight:500;">${s.displayName || '—'}</td>
      <td style="color:#666;">${s.email || '—'}</td>
      <td>${satisfactionMap[s.q1_satisfaction] || s.q1_satisfaction || '—'}</td>
      <td>${s.q2_favorite || '—'}</td>
      <td style="max-width:200px; word-break:break-word; color:#555;">${s.q3_comment || '—'}</td>
      <td style="font-family:monospace; color:var(--brick); font-weight:700;">${s.giftCode || '—'}</td>
      <td style="color:#888;">${date}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById("survey-body").innerHTML = html;
}

// ── EXPORT CSV ──────────────────────────────
function exportCSV(type) {
  let rows, filename;
  if (type === 'participants') {
    rows = [["姓名","Email","集章數","蓋章據點","問卷完成","抽獎獎項","序號","兌換狀態","登記時間"]];
    allParticipants.forEach(p => {
      rows.push([
        p.displayName || '',
        p.email || '',
        (p.stamps||[]).length,
        (p.stamps||[]).join('|'),
        p.surveyDone ? '是' : '否',
        p.prizeName || '',
        p.giftCode || '',
        p.redeemed ? '已兌換' : (p.prizeName ? '待兌換' : ''),
        p.createdAt ? new Date(p.createdAt.seconds*1000).toLocaleDateString("zh-TW") : ''
      ]);
    });
    filename = '集章記錄.csv';
  } else {
    rows = [["姓名","Email","滿意度","最喜歡據點","意見回饋","序號","填寫時間"]];
    allSurveys.forEach(s => {
      rows.push([
        s.displayName || '',
        s.email || '',
        s.q1_satisfaction || '',
        s.q2_favorite || '',
        (s.q3_comment || '').replace(/,/g, '，'),
        s.giftCode || '',
        s.submittedAt ? new Date(s.submittedAt.seconds*1000).toLocaleDateString("zh-TW") : ''
      ]);
    });
    filename = '問卷回饋.csv';
  }

  const bom = '\uFEFF';
  const csv = bom + rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── TABS ────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

async function loadLotteryStats() {
  const body = document.getElementById("lottery-stats-body");
  body.innerHTML = "<div class='loading'>載入中...</div>";
  
  // Get last 3 days
  const days = [];
  for (let i = 0; i < 3; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    days.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
  }

  let html = "";
  for (const day of days) {
    const snap = await db.collection("lottery_daily").doc(day).get();
    const data = snap.exists ? snap.data() : {};
    html += `<div style="margin-bottom:24px;">
      <div style="font-weight:700;font-size:15px;color:#8B2217;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #f0ddd8;">📅 ${day}</div>
      <table style="width:100%;border-collapse:collapse;">
        <tr style="background:#f9f0ee;font-size:12px;color:#666;">
          <th style="padding:8px;text-align:left;">獎項</th>
          <th style="padding:8px;text-align:center;">已發出</th>
          <th style="padding:8px;text-align:center;">劃額</th>
          <th style="padding:8px;text-align:center;">剩餘</th>
          <th style="padding:8px;text-align:center;">狀態</th>
        </tr>`;
    for (const p of PRIZES_ADMIN) {
      const used = data[p.id] || 0;
      const limit = p.dailyLimits[day] || 0;
      const remaining = limit - used;
      const status = remaining === 0 ? "🔴 已售完" : remaining <= 2 ? "🟡 剩餘不多" : "🟢 充足";
      html += `<tr style="border-bottom:1px solid #f0ddd8;font-size:13px;">
        <td style="padding:8px;">${p.name}</td>
        <td style="padding:8px;text-align:center;">${used}</td>
        <td style="padding:8px;text-align:center;font-weight:700;">${limit}</td>
        <td style="padding:8px;text-align:center;font-weight:700;">${remaining}</td>
        <td style="padding:8px;text-align:center;">${status}</td>
      </tr>`;
    }
    html += "</table></div>";
  }
  body.innerHTML = html;
}

</script>
</body>
</html>
